services:

  db:
    image: postgres:18-bookworm
    restart: always
    shm_size: 128mb
    ports:
      - 5532:5432
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: cashflow

  adminer:
    image: adminer:5.4.1-standalone
    restart: always
    ports:
      - 8081:8080
